<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rescue Food Contact Form</title>
  <link rel="stylesheet" href="contact.css">
</head>

<body>

  <div class="container">
    <h2>🥗 Rescue Food Contact Form</h2>

    <form id="foodForm">

      <input type="text" id="name" placeholder="Full Name" required>
      <input type="email" id="email" placeholder="Email" required>
      <input type="tel" id="phone" placeholder="Phone Number" required>

      <input type="text" id="address" placeholder="Address" required>
      <input type="text" id="city" placeholder="City" required>
      <input type="text" id="foodType" placeholder="Food Type (Veg/Non-Veg)" required>

      <input type="number" id="quantity" placeholder="Quantity (kg/plates)" required>
      <input type="datetime-local" id="pickupTime" required>

      <select id="donationType" required>
        <option value="">Donation Type</option>
        <option value="leftover">Leftover Food</option>
        <option value="fresh">Fresh Food</option>
        <option value="packaged">Packaged Food</option>
      </select>

      <input type="text" id="organization" placeholder="Organization / Individual">
      <textarea id="message" placeholder="Additional Message"></textarea>

      <button type="submit">Submit</button>

    </form>

    <p id="status"></p>
  </div>

  <script type="module" src="contact.js"></script>

</body>
</html>
